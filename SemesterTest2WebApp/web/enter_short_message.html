<html>
    <head>
        <title>Enter Short Message Page</title>

    <body>
        <h1>Enter Short Message</h1>
        <p>
            Enter Your Short Message To Analyze.
        </p>

                <tr>
                    <td>Enter A Short Message</td>

                    <td></td>

            </table>
        </form>
