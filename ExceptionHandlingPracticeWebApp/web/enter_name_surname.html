<html>
    <head>
        <title>Enter Enter and Surname Page</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <h1>Enter Enter and Surname</h1>
        <p>
            Please Enter your name and surname on the form below.
        </p>
        <form action="CheckNameAndSurname.do" method="POST">
            <table>
                <tr>
                    <td>Name : </td>
                    <td><input type="text" name="name"></td>
                </tr>
                <tr>
                    <td>Surname : </td>
                    <td><input type="text" name="surname"></td>
                </tr>
                <tr>
                    <td></td>
                    <td><input type="submit" name="Validate Name And Surname"></td>
                </tr>
            </table>
        </form>
    </body>
</html>
