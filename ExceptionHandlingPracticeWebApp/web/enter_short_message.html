<html>
    <head>
        <title>Enter A Message Page</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <h1>Enter A Message</h1>
        <p>
            Please Enter A Short Message to see if its a Sentence
        </p>
        <form action="ValidateShortMessages.do" method="POST">
            <table>
                <tr>
                    <td>Enter Your Message</td>
                    <td><input type="text" name="message"></td>
                </tr>
                <tr>
                    <td>Press The Button</td>
                    <td><input type="submit" value="Validate Message"></td>
                </tr>
            </table>
        </form>
    </body>
</html>
