<html>
    <head>
        <title>Enter Student Or ID Number Page</title>

    <body>
        <h1>Enter Student Or ID Number</h1>
        <p>
            Please Enter Your Student Or ID Number.
        </p>

            <table>
                <tr>
                    <td>Student Number : </td>
                    <td><input type="text" name="student_number"></td>
                </tr>
                <tr>
                    <td>ID Number : </td>
                    <td><input type="text" name="id"></td>
                </tr>
                <tr>
                    <td></td>

                </tr>
            </table>
        </form>
    </body>
