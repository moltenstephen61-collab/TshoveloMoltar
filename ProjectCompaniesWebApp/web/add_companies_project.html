<html>
    <head>
        <title>Add Companies With Their Three Projects Page</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <h1>Add Companies With Their Three Projects</h1>
        <p>
            Please fill in the form below. 
        </p>
        <form action="AddCompaniesAndProjects.do" method="Post">
            <table border="1">
                <tr>
                    <td>Company ID : </td>
                    <td><input type="text" name="comp_id"></td>
                </tr>
                <tr>
                    <td>Company Name : </td>
                    <td><input type="text" name="comp_name"></td>
                </tr>
                <tr>
                    <td>1. Project Title : </td>
                    <td><input type="text" name="project_title"></td>
                </tr>
                <tr>
                    <td>Project Description : </td>
                    <td><input type="text" name="project_descrp"></td>
                </tr>
                <tr>
                    <td>2. Project Title : </td>
                    <td><input type="text" name="project_title_1"></td>
                </tr>
                <tr>
                    <td>Project Description : </td>
                    <td><input type="text" name="project_descrp_1"></td>
                </tr>
                <tr>
                    <td>3. Project Title : </td>
                    <td><input type="text" name="project_title_2"></td>
                </tr>
                <tr>
                    <td>Project Description : </td>
                    <td><input type="text" name="project_descrp_2"></td>
                </tr>
                <tr>
                    <td></td>
                    <td><input type="submit" value="Add Company"></td>
                </tr>
            </table>
        </form>
    </body>
</html>
