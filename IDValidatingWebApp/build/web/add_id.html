<html>
    <head>
        <title>Add ID Page</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <h1>Add ID</h1>
        <p>
            Please enter the your name and id below 
        </p>
        <form action="VerifyServlet.do" method="POST">
           <label>ID Number:</label>
           <input type="text" 
           name="idNumber" 
           required 
           minlength="13" 
           maxlength="13" 
           pattern="\d{13}" 
           title="Please enter exactly 13 digits">
         <button type="submit">Check ID</button> 
        </form>
    </body>
</html>
